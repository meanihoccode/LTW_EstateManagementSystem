<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý BĐS - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/darkmode.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/search-utils.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item active">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item" sec:authorize="hasAnyRole('Admin', 'Quản lý')">                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item" sec:authorize="hasRole('Admin')">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Bất Động Sản</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addPropertyBtn" sec:authorize="hasAnyRole('Admin', 'Quản lý')">+ Thêm BĐS</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên hoặc địa chỉ...">
                    <select id="filterStatus">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="Cho thuê">Cho thuê</option>
                        <option value="Trống">Trống</option>
                        <option value="Bảo trì">Bảo trì</option>
                    </select>
                </div>

                <!-- Properties Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên BĐS</th>
                                <th>Loại</th>
                                <th>Địa chỉ</th>
                                <th>Diện tích</th>
                                <th>Giá thuê</th>
                                <th>Trạng thái</th>
                                <th>Chủ sở hữu</th>
                                <th sec:authorize="hasAnyRole('Admin','Quản lý')">NV quản lý</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="propertiesTable">
                            <tr>
                                <td colspan="10" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div class="pagination-info">
                        <span>Hiển thị <strong id="startRecord">0</strong> - <strong id="endRecord">0</strong> trong <strong id="totalRecords">0</strong> bản ghi</span>
                        <select id="pageSize" class="page-size-select">
                            <option value="5">5 bản ghi/trang</option>
                            <option value="10" selected>10 bản ghi/trang</option>
                            <option value="20">20 bản ghi/trang</option>
                            <option value="50">50 bản ghi/trang</option>
                        </select>
                    </div>
                    <div class="pagination-buttons" id="paginationButtons">
                        <!-- Được tạo bởi JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa BĐS -->
    <div id="propertyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Bất Động Sản</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="propertyForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tên BĐS:</label>
                        <input type="text" id="tenBDS" required>
                    </div>
                    <div class="form-group">
                        <label>Loại BĐS:</label>
                        <select id="loaiBDS" required>
                            <option>Căn hộ</option>
                            <option>Nhà riêng</option>
                            <option>Biệt thự</option>
                            <option>Cửa hàng</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label>Địa chỉ:</label>
                        <input type="text" id="diaChi" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Diện tích (m²):</label>
                        <input type="number" id="dienTich" required>
                    </div>
                    <div class="form-group">
                        <label>Giá thuê (đ/tháng):</label>
                        <input type="number" id="giaThue" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Trạng thái:</label>
                        <select id="trangThai" required>
                            <option>Cho thuê</option>
                            <option>Trống</option>
                            <option>Bảo trì</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Chủ sở hữu:</label>
                        <select id="chuSoHuu" required>
                            <option value="">-- Chọn chủ sở hữu --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="staffRow">
                    <div class="form-group full">
                        <label>Nhân viên quản lý:</label>
                        <select id="nhanVienQuanLy">
                            <option value="">-- Chọn nhân viên --</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let propertiesData = [];
        let userRole = '';
        let myStaffId = null;
        let pagination = new PaginationManager({ pageSize: 10 });

        document.addEventListener('DOMContentLoaded', function() {
            fetchUserRole().then(() => {
                loadProperties();
                loadOwners();
                loadStaffs();
                setupEventListeners();
                setupPaginationListener();
            });
        });

        async function fetchUserRole() {
            try {
                const response = await fetch('/api/me/role');
                if (!response.ok) return;
                const data = await response.json();
                userRole = data.role || '';
                myStaffId = data.staffId || null;
            } catch (error) {
                console.error('Error fetching user role:', error);
            }
        }

        async function loadProperties() {
            try {
                const response = await fetch('/api/properties');
                if (!response.ok) {
                    throw new Error('Failed to load properties');
                }

                propertiesData = await response.json();
                pagination.setData(propertiesData);
                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Error:',error);
                alert('Lỗi tải dữ liệu ' + error.message);
                propertiesData = [];
                pagination.setData(propertiesData);
                renderTable();
            }
        }

        async function loadOwners() {
            const ownerSelect = document.getElementById('chuSoHuu');
            try {
                const response = await fetch('/api/owners');
                if (!response.ok) {
                    throw new Error('Failed to load owners');
                }
                const ownersData = await response.json();

                // Xóa tất cả options cũ trừ option đầu tiên
                while (ownerSelect.options.length > 1) {
                    ownerSelect.remove(1);
                }

                // Thêm từng owner vào dropdown
                ownersData.forEach(owner => {
                    const option = document.createElement('option');
                    option.value = owner.id;  // Gán ID của owner
                    option.textContent = owner.fullName;  // Hiển thị tên của owner
                    ownerSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi tải chủ sở hữu: ' + error.message);
                return;
            }
        }

        async function loadStaffs() {
            const staffSelect = document.getElementById('nhanVienQuanLy');
            try {
                const response = await fetch('/api/staffs');
                if (!response.ok) {
                    throw new Error('Failed to load staffs');
                }
                const staffsData = await response.json();

                // Xóa tất cả options cũ trừ option đầu tiên
                while (staffSelect.options.length > 1) {
                    staffSelect.remove(1);
                }

                // Thêm từng staff vào dropdown
                staffsData.forEach(staff => {
                    const option = document.createElement('option');
                    option.value = staff.id;  // Gán ID của staff
                    option.textContent = staff.fullName;  // Hiển thị tên của staff
                    staffSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error:', error);
                if(userRole!=='Nhân viên') alert('Lỗi tải nhân viên: ' + error.message);
                return;
            }
        }

        function buildActions(p) {
            if (userRole !== 'Nhân viên') {
                // Admin/Quản lý thấy đủ nút
                return `<button class="btn-small" onclick="editProperty(${p.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteProperty(${p.id})">Xóa</button>`;
            }
            // Nhân viên: chỉ thấy nút Sửa nếu BĐS do mình quản lý
            if (p.staff && p.staff.id === myStaffId) {
                return `<button class="btn-small" onclick="editProperty(${p.id})">Sửa</button>`;
            }
            return ''; // BĐS của người khác → không có nút nào
        }

        function renderTable() {
            const tbody = document.getElementById('propertiesTable');
            const pagedData = pagination.getPagedData();

            if (propertiesData.length === 0) {
                const colspan = userRole === 'Nhân viên' ? 9 : 10;
                tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>`;
                return;
            }

            if (pagedData.length === 0) {
                const colspan = userRole === 'Nhân viên' ? 9 : 10;
                tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>`;
                return;
            }

            tbody.innerHTML = pagedData.map(p => {
                const staffColumn = userRole === 'Nhân viên' ? '' : `<td>${p.staff ? p.staff.fullName : 'N/A'}</td>`;
                return `
                    <tr>
                        <td>#${p.id}</td>
                        <td>${p.name}</td>
                        <td>${p.type}</td>
                        <td>${p.address}</td>
                        <td>${p.area}</td>
                        <td>${p.rentalPrice}Đ</td>
                        <td><span class="badge ${getStatusClass(p.status)}">${p.status}</span></td>
                        <td>${p.owner ? p.owner.fullName : 'N/A'}</td>
                        ${staffColumn}
                        <td>${buildActions(p)}</td>
                    </tr>
                `;
            }).join('');

            // Cập nhật thông tin pagination
            const info = pagination.getPaginationInfo();
            document.getElementById('startRecord').textContent = info.startRecord;
            document.getElementById('endRecord').textContent = info.endRecord;
            document.getElementById('totalRecords').textContent = info.totalRecords;
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Cho thuê': return 'rented';
                case 'Trống': return 'empty';
                case 'Bảo trì': return 'maintenance';
                default: return '';
            }
        }

        function setupEventListeners() {
            // Dùng ?. để tránh crash khi nút bị ẩn bởi sec:authorize
            document.getElementById('addPropertyBtn')?.addEventListener('click', openModal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('cancelBtn')?.addEventListener('click', closeModal);
            document.getElementById('propertyForm')?.addEventListener('submit', saveProperty);

            document.getElementById('searchInput')?.addEventListener('keyup', filterTable);
            document.getElementById('filterStatus')?.addEventListener('change', filterTable);
        }

        function renderPagination() {
            pagination.renderPaginationButtons('paginationButtons', 'goToPropertyPage');
        }

        function goToPropertyPage(page) {
            if (pagination.goToPage(page)) {
                renderTable();
                renderPagination();
                document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupPaginationListener() {
            document.getElementById('pageSize')?.addEventListener('change', function(e) {
                pagination.setPageSize(e.target.value);
                renderTable();
                renderPagination();
            });
        }

        function openModal() {
            if (userRole === 'Nhân viên') {
                alert('Bạn không có quyền thêm mới bất động sản');
                return;
            }
            document.getElementById('modalTitle').textContent = 'Thêm Bất Động Sản';
            document.getElementById('propertyForm').reset();
            delete document.getElementById('propertyForm').dataset.editingId;
            // Admin/Quản lý mới thấy phần chọn nhân viên
            document.getElementById('staffRow').style.display = '';
            document.getElementById('propertyModal').style.display = 'block';
        }

        function closeModal() {
            const modal = document.getElementById('propertyModal');
            if (modal) {
                modal.style.display = 'none';
                console.log('Modal đã đóng');
            }
        }

        // Đóng modal khi click ngoài nội dung
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('propertyModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

        async function saveProperty(e) {
            e.preventDefault();
            const editingId = document.getElementById('propertyForm').dataset.editingId;

            // Nhân viên tự dùng staffId của mình, không cho chọn
            const staffIdValue = userRole === 'Nhân viên'
                ? myStaffId
                : parseInt(document.getElementById('nhanVienQuanLy').value);

            const formData = {
                name: document.getElementById('tenBDS').value,
                type: document.getElementById('loaiBDS').value,
                address: document.getElementById('diaChi').value,
                area: parseFloat(document.getElementById('dienTich').value),
                rentalPrice: parseFloat(document.getElementById('giaThue').value),
                status: document.getElementById('trangThai').value,
                ownerId: parseInt(document.getElementById('chuSoHuu').value),
                staffId: staffIdValue
            };

            if (!formData.name || !formData.address || !formData.ownerId || !formData.type ||
                !formData.area || !formData.rentalPrice || !formData.status || !formData.staffId) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            try {
                const url = editingId ? `/api/properties/${editingId}` : '/api/properties';
                const method = editingId ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(formData)
                });

                const responseText = await response.text();
                if (!response.ok) throw new Error('Failed to save property: ' + responseText);

                alert((editingId ? 'Cập nhật' : 'Thêm') + ' bất động sản thành công');
                closeModal();
                loadProperties();
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi: ' + error.message);
            }
        }

        async function editProperty(id) {
            // Guard: Nhân viên chỉ sửa BĐS do mình quản lý
            if (userRole === 'Nhân viên') {
                const p = propertiesData.find(x => x.id === id);
                if (!p || !p.staff || p.staff.id !== myStaffId) {
                    alert('Bạn chỉ có thể sửa BĐS do mình quản lý');
                    return;
                }
            }

            try {
                const response = await fetch(`/api/properties/${id}`);
                if (!response.ok) throw new Error('Failed to load property details');
                const property = await response.json();

                document.getElementById('modalTitle').textContent = 'Sửa Bất Động Sản';
                document.getElementById('tenBDS').value = property.name;
                document.getElementById('loaiBDS').value = property.type;
                document.getElementById('diaChi').value = property.address;
                document.getElementById('dienTich').value = property.area;
                document.getElementById('giaThue').value = property.rentalPrice;
                document.getElementById('trangThai').value = property.status;
                document.getElementById('chuSoHuu').value = property.owner ? property.owner.id : '';

                if (userRole === 'Nhân viên') {
                    // Ẩn phần chọn nhân viên, tự gán chính mình
                    document.getElementById('staffRow').style.display = 'none';
                    document.getElementById('nhanVienQuanLy').value = myStaffId;
                } else {
                    document.getElementById('staffRow').style.display = '';
                    document.getElementById('nhanVienQuanLy').value = property.staff ? property.staff.id : '';
                }

                document.getElementById('propertyForm').dataset.editingId = id;
                document.getElementById('propertyModal').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi tải chi tiết bất động sản: ' + error.message);
            }
        }

        async function deleteProperty(id) {
            if (confirm('Bạn có chắc muốn xóa?')) {
                try {
                    const response = await fetch(`/api/properties/${id}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) {
                        throw new Error('Failed to delete property');
                    }
                    alert('Xóa bất động sản thành công');
                    loadProperties();
                } catch (error) {
                    console.error('Error:', error);
                    alert('Lỗi: ' + error.message);
                }
            } else {
                return;
            }
        }

        function filterTable() {
            const searchText = document.getElementById('searchInput').value.trim();
            const statusFilter = document.getElementById('filterStatus').value;

            if (!searchText && !statusFilter) {
                pagination.clearFilter();
            } else {
                pagination.filterData(p => {
                    // Nếu không nhập searchText thì coi như match tất cả, chỉ lọc theo status
                    const matchesSearch = !searchText ||
                        (p.name && searchWithoutDiacritics(searchText, p.name)) ||
                        (p.address && searchWithoutDiacritics(searchText, p.address));

                    const matchesStatus = !statusFilter || p.status === statusFilter;
                    return matchesSearch && matchesStatus;
                });
            }

            renderTable();
            renderPagination();
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('propertyModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhân Viên - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/darkmode.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/search-utils.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item active">
                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item" sec:authorize="hasRole('Admin')">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Nhân Viên</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addStaffBtn">+ Thêm Nhân Viên</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên hoặc chức vụ...">
                </div>

                <!-- Staff Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Họ tên</th>
                                <th>Điện thoại</th>
                                <th>Chức vụ</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="staffTable">
                            <tr>
                                <td colspan="5" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div class="pagination-buttons" id="paginationButtons">
                        <!-- Được tạo bởi JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Nhân Viên -->
    <div id="staffModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Nhân Viên</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="staffForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ tên:</label>
                        <input type="text" id="hoTen" required>
                    </div>
                    <div class="form-group">
                        <label>Điện thoại:</label>
                        <input type="tel" id="soDienThoai" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label>Chức vụ:</label>
                        <select id="vaiTro" required onchange="autoSetQuyenHan(this.value)">
                            <option>Quản lý</option>
                            <option>Nhân viên kinh doanh</option>
                            <option>Nhân viên kỹ thuật</option>
                            <option>Nhân viên hành chính</option>
                        </select>
                    </div>
                </div>
                <!-- quyenHan ẩn, tự động set theo chức vụ -->
                <input type="hidden" id="quyenHan" value="Quản lý">
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let staffData = [];
        let pagination = new PaginationManager({ pageSize: 8 });

        document.addEventListener('DOMContentLoaded', function() {
            loadStaff();
            setupEventListeners();
            setupPaginationListener();
        });

        async function loadStaff() {
            try {
                const response = await fetch('/api/staffs');

                if (!response.ok) {
                    throw new Error('Failed to load staff');
                }

                staffData = await response.json();
                pagination.setData(staffData);
                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Error:',error);
                alert('Lỗi tải dữ liệu: ' + error.message);
                staffData = [];
                pagination.setData(staffData);
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('staffTable');
            const pagedData = pagination.getPagedData();

            if (staffData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>';
                return;
            }

            if (pagedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>';
                return;
            }

            tbody.innerHTML = pagedData.map(s => `
                <tr>
                    <td>#${s.id}</td>
                    <td>${s.fullName}</td>
                    <td>${s.phone}</td>
                    <td>${s.role}</td>
                    <td>
                        <button class="btn-small" onclick="editStaff(${s.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteStaff(${s.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function setupEventListeners() {
            document.getElementById('addStaffBtn').addEventListener('click', openModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('staffForm').addEventListener('submit', saveStaff);

            document.getElementById('searchInput').addEventListener('keyup', filterTable);
        }

        function renderPagination() {
            pagination.renderPaginationButtons('paginationButtons', 'goToStaffPage');
        }

        function goToStaffPage(page) {
            if (pagination.goToPage(page)) {
                renderTable();
                renderPagination();
                document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupPaginationListener() {
            // pageSize fix cứng = 8 => không cần listener
        }

        function autoSetQuyenHan(vaiTro) {
            // Chức vụ nào bắt đầu bằng "Nhân viên" → quyền hạn "Nhân viên"
            // Quản lý → "Quản lý"
            const quyen = vaiTro.startsWith('Nhân viên') ? 'Nhân viên' : vaiTro;
            document.getElementById('quyenHan').value = quyen;
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Nhân Viên';
            document.getElementById('staffForm').reset();
            delete document.getElementById('staffForm').dataset.editingId;
            // Set quyền hạn mặc định theo chức vụ mặc định (Quản lý)
            autoSetQuyenHan(document.getElementById('vaiTro').value);
            document.getElementById('staffModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('staffModal').style.display = 'none';
        }

        async function saveStaff(e) {
            e.preventDefault();
            const editingId = document.getElementById('staffForm').dataset.editingId;
            const staffData_form = {
                fullName: document.getElementById('hoTen').value,
                phone: document.getElementById('soDienThoai').value,
                role: document.getElementById('vaiTro').value,
                quyenHan: document.getElementById('quyenHan').value
            };

            if (!staffData_form.fullName || !staffData_form.phone) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            try {
                const url = editingId ? `/api/staffs/${editingId}` : '/api/staffs';
                const method = editingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(staffData_form)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to save staff');
                }

                alert((editingId ? 'Cập nhật' : 'Thêm') + ' nhân viên thành công');
                closeModal();
                loadStaff();

            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi: ' + error.message);
            }
        }

        async function editStaff(id) {
            try {
                const response = await fetch(`/api/staffs/${id}`);
                if (!response.ok) {
                    throw new Error('Failed to load staff details');
                }
                const staff = await response.json();

                document.getElementById('modalTitle').textContent = 'Sửa Nhân Viên';
                document.getElementById('hoTen').value = staff.fullName;
                document.getElementById('soDienThoai').value = staff.phone;
                document.getElementById('vaiTro').value = staff.role;
                // Lấy quyền hạn từ account nếu có
                document.getElementById('quyenHan').value = staff.account ? staff.account.role : 'Nhân viên';
                document.getElementById('staffForm').dataset.editingId = id;
                document.getElementById('staffModal').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi tải thông tin nhân viên: ' + error.message);
            }
        }

        async function deleteStaff(id) {
            if (!confirm('Bạn có chắc muốn xóa?')) {
                return;
            }
            try {
                const response = await fetch(`/api/staffs/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    throw new Error('Failed to delete staff');
                }

                alert('Xóa nhân viên thành công');
                loadStaff();
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi: ' + error.message);
            }
        }

        function filterTable() {
            const searchText = document.getElementById('searchInput').value;

            if (!searchText) {
                pagination.clearFilter();
            } else {
                pagination.filterData(s => {
                    return (s.fullName && searchWithoutDiacritics(searchText, s.fullName)) ||
                        (s.role && searchWithoutDiacritics(searchText, s.role))
                        || (s.phone && searchWithoutDiacritics(searchText, s.phone));
                });
            }

            renderTable();
            renderPagination();
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('staffModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>

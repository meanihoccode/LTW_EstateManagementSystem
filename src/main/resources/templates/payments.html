<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thanh Toán - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/darkmode.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/search-utils.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item active">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item" sec:authorize="hasAnyRole('Admin', 'Quản lý')">                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item" sec:authorize="hasRole('Admin')">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Thanh Toán</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addPaymentBtn">+ Thêm Thanh Toán</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo ID hoặc hợp đồng...">
                    <select id="filterStatus">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="Đã duyệt">Đã duyệt</option>
                        <option value="Chờ duyệt">Chờ duyệt</option>
                        <option value="Từ chối">Từ chối</option>
                    </select>
                </div>

                <!-- Payments Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Hợp Đồng</th>
                                <th>Ngày thanh toán</th>
                                <th>Số tiền</th>
                                <th>Phương thức</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTable">
                            <tr>
                                <td colspan="7" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div class="pagination-info">
                        <span>Hiển thị <strong id="startRecord">0</strong> - <strong id="endRecord">0</strong> trong <strong id="totalRecords">0</strong> bản ghi</span>
                        <select id="pageSize" class="page-size-select">
                            <option value="5">5 bản ghi/trang</option>
                            <option value="10" selected>10 bản ghi/trang</option>
                            <option value="20">20 bản ghi/trang</option>
                            <option value="50">50 bản ghi/trang</option>
                        </select>
                    </div>
                    <div class="pagination-buttons" id="paginationButtons">
                        <!-- Được tạo bởi JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Thanh Toán -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Thanh Toán</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="paymentForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Hợp Đồng:</label>
                        <select id="hopDong" required>
                            <option>-- Chọn hợp đồng --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ngày thanh toán:</label>
                        <input type="date" id="ngayThanhToan" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Số tiền (đ):</label>
                        <input type="number" id="soTien" required>
                    </div>
                    <div class="form-group">
                        <label>Phương thức:</label>
                        <select id="phuongThuc" required>
                            <option>-- Chon phương thức --</option>
                            <option>Chuyển khoản</option>
                            <option>Tiền mặt</option>
                            <option>Séc</option>
                            <option>Khác</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full">
                        <label>Trạng thái:</label>
                        <select id="trangThai" required>
                            <option>-- Chọn trạng thái --</option>
                            <option>Đã duyệt</option>
                            <option>Chờ duyệt</option>
                            <option>Từ chối</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let paymentsData = [];
        let pagination = new PaginationManager({ pageSize: 10 });

        document.addEventListener('DOMContentLoaded', function() {
            loadPayments();
            loadContracts();
            setupEventListeners();
            setupPaginationListener();
        });

        async function loadPayments() {
            try {
                const response = await fetch('/api/payments');
                if (!response.ok) {
                    throw new Error('Failed to load payments');
                }
                paymentsData = await response.json();
                pagination.setData(paymentsData);
                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Error: ',error);
                alert('Lỗi khi tải dữ liệu thanh toán. Vui lòng thử lại sau.');
                paymentsData=[];
                pagination.setData(paymentsData);
                renderTable();
            }
        }

        async function loadContracts() {
            const select = document.getElementById('hopDong');
            try {
                const response = await fetch('/api/contracts');
                if (!response.ok) {
                    throw new Error('Failed to load contracts');
                }
                const contracts = await response.json();
                while (select.length > 1) {
                    select.remove(1);
                }
                contracts.forEach(contract => {
                    const option = document.createElement('option');
                    option.value = contract.id;
                    option.textContent = "Hợp đồng #" + contract.id;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error: ',error);
                alert('Lỗi khi tải dữ liệu hợp đồng. Vui lòng thử lại sau.');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('paymentsTable');
            const pagedData = pagination.getPagedData();

            if (paymentsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>';
                return;
            }

            if (pagedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>';
                return;
            }

            tbody.innerHTML = pagedData.map(p => `
                <tr>
                    <td>#${p.id}</td>
                    <td>Hợp đồng - ${p.contract.id}</td>
                    <td>${p.paymentDate}</td>
                    <td>${p.amount}Đ</td>
                    <td>${p.method}</td>
                    <td><span class="badge ${getStatusClass(p.status)}">${p.status}</span></td>
                    <td>
                        <button class="btn-small" onclick="editPayment(${p.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deletePayment(${p.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');

            // Cập nhật thông tin pagination
            const info = pagination.getPaginationInfo();
            document.getElementById('startRecord').textContent = info.startRecord;
            document.getElementById('endRecord').textContent = info.endRecord;
            document.getElementById('totalRecords').textContent = info.totalRecords;
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Đã duyệt': return 'active';
                case 'Chờ duyệt': return 'pending';
                case 'Từ chối': return 'inactive';
                default: return '';
            }
        }

        function setupEventListeners() {
            document.getElementById('addPaymentBtn').addEventListener('click', openModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('paymentForm').addEventListener('submit', savePayment);

            // Tìm kiếm: dùng input để bắt cả gõ, dán (paste), xóa (clear) nhanh
            document.getElementById('searchInput').addEventListener('input', filterTable);
            document.getElementById('filterStatus').addEventListener('change', filterTable);
        }

        function renderPagination() {
            pagination.renderPaginationButtons('paginationButtons', 'goToPaymentPage');
        }

        function goToPaymentPage(page) {
            if (pagination.goToPage(page)) {
                renderTable();
                renderPagination();
                document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupPaginationListener() {
            document.getElementById('pageSize')?.addEventListener('change', function(e) {
                pagination.setPageSize(e.target.value);
                renderTable();
                renderPagination();
            });
        }
        function filterTable() {
            try {
                const searchTextRaw = document.getElementById('searchInput').value.trim();
                const statusFilter = document.getElementById('filterStatus').value;

                if (!searchTextRaw && !statusFilter) {
                    pagination.clearFilter();
                } else {
                    pagination.filterData(p => {
                        let matchesSearch = !searchTextRaw;

                        if (!matchesSearch) {
                            const searchText = searchTextRaw;

                            if (p?.id != null) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.id));
                            }

                            if (!matchesSearch && p?.contract?.id != null) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.contract.id));
                            }

                            // Match theo đúng chuỗi UI (user hay copy/gõ theo)
                            if (!matchesSearch && p?.contract?.id != null) {
                                matchesSearch = searchWithoutDiacritics(searchText, `hop dong - ${p.contract.id}`);
                            }

                            if (!matchesSearch && p?.paymentDate) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.paymentDate));
                            }

                            if (!matchesSearch && p?.amount != null) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.amount));
                            }

                            if (!matchesSearch && p?.method) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.method));
                            }

                            if (!matchesSearch && p?.status) {
                                matchesSearch = searchWithoutDiacritics(searchText, String(p.status));
                            }

                            if (!matchesSearch && p?.contract?.id != null) {
                                const contractLabel = `hop dong ${p.contract.id}`;
                                matchesSearch = searchWithoutDiacritics(searchText, contractLabel);
                            }
                        }

                        const matchesStatus = !statusFilter || p?.status === statusFilter;
                        return matchesSearch && matchesStatus;
                    });
                }

                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Filter error:', error);
            }
        }

        // openModal() Mở modal thêm thanh toán
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Thanh Toán';
            document.getElementById('paymentForm').reset();
            delete document.getElementById('paymentForm').dataset.editingId;
            document.getElementById('paymentModal').style.display = 'block';
        }

        // closeModal() Đóng modal
        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        // savePayment() Lưu (thêm/sửa) thanh toán
        async function savePayment(e) {
            e.preventDefault();

            const editingId = document.getElementById('paymentForm').dataset.editingId;

            const contractId = document.getElementById('hopDong').value;
            const paymentDate = document.getElementById('ngayThanhToan').value;
            const amount = document.getElementById('soTien').value;
            const method = document.getElementById('phuongThuc').value;
            const status = document.getElementById('trangThai').value;

            if (!contractId || !paymentDate || !amount || !method || !status) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            const payment = {
                id: editingId,
                contractId: parseInt(contractId),
                paymentDate: paymentDate,
                amount: parseFloat(amount),
                method: method,
                status: status
            };

            try {
                const url = editingId ? '/api/payments/' + editingId : '/api/payments';
                const httpMethod = editingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: httpMethod,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payment)
                });

                if (!response.ok) {
                    const responseText = await response.text();
                    throw new Error('Failed to save payment: ' + responseText);
                }

                closeModal();
                await loadPayments();
            } catch (error) {
                console.error('Error saving payment:', error);
                alert('Lỗi khi lưu thanh toán. ' + (error?.message || 'Vui lòng thử lại sau.'));
            }
        }

        // editPayment() Mở modal sửa
        async function editPayment(id) {
            try {
                const response = await fetch('/api/payments/' + id);
                if (!response.ok) {
                    throw new Error('Failed to load payment details');
                }

                const payment = await response.json();

                document.getElementById('hopDong').value = payment.contract ? payment.contract.id : '';
                document.getElementById('ngayThanhToan').value = payment.paymentDate || '';
                document.getElementById('soTien').value = payment.amount || '';
                document.getElementById('phuongThuc').value = payment.method || '';
                document.getElementById('trangThai').value = payment.status || '';

                document.getElementById('paymentForm').dataset.editingId = id;
                document.getElementById('modalTitle').textContent = 'Sửa Thanh Toán';
                document.getElementById('paymentModal').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi khi tải chi tiết thanh toán. Vui lòng thử lại sau.');
            }
        }

        // deletePayment() Xóa thanh toán
        async function deletePayment(id) {
            if (!confirm('Bạn có chắc muốn xóa?')) return;

            try {
                const response = await fetch('/api/payments/' + id, { method: 'DELETE' });
                if (!response.ok) {
                    const responseText = await response.text();
                    throw new Error('Failed to delete payment: ' + responseText);
                }
                await loadPayments();
            } catch (error) {
                console.error('Error:', error);
                alert('Lỗi khi xóa thanh toán. Vui lòng thử lại sau.');
            }
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('paymentModal');
            if (event.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>

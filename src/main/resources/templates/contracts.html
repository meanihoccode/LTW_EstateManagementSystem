<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Hợp Đồng - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item active">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item">
                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Hợp Đồng</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addContractBtn">+ Thêm Hợp Đồng</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo ID hoặc khách thuê...">
                    <select id="filterStatus">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="Hiệu lực">Hiệu lực</option>
                        <option value="Kết thúc">Kết thúc</option>
                        <option value="Chờ duyệt">Chờ duyệt</option>
                    </select>
                </div>

                <!-- Contracts Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>BĐS</th>
                                <th>Khách thuê</th>
                                <th>Ngày bắt đầu</th>
                                <th>Ngày kết thúc</th>
                                <th>Tiền cọc</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="contractsTable">
                            <tr>
                                <td colspan="8" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Hợp Đồng -->
    <div id="contractModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Hợp Đồng</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="contractForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>BĐS:</label>
                        <select id="batDongSan" required>
                            <option>-- Chọn BĐS --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Khách thuê:</label>
                        <select id="khachThue" required>
                            <option>-- Chọn khách thuê --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày bắt đầu:</label>
                        <input type="date" id="ngayBatDau" required>
                    </div>
                    <div class="form-group">
                        <label>Ngày kết thúc:</label>
                        <input type="date" id="ngayKetThuc" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tiền cọc (đ):</label>
                        <input type="number" id="tienCoc" required>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái:</label>
                        <select id="trangThai" required>
                            <option>Hiệu lực</option>
                            <option>Kết thúc</option>
                            <option>Chờ duyệt</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>

        let contractsData = [];

        // loadContracts()	Tạo dữ liệu hợp đồng mẫu
        // loadProperties()	Đổ BĐS vào ô chọn
        // loadTenants()	Đổ khách thuê vào ô chọn
        // setupEventListeners()	Gắn sự kiện cho nút bấm
        document.addEventListener('DOMContentLoaded', function() {
            loadContracts();
            loadProperties();
            loadTenants();
            setupEventListeners();
        });

        async function loadContracts() {
            try {
                const resonse = await fetch('/api/contracts');
                if (!resonse.ok) {
                    throw new Error("Failed to load contracts");
                }
                contractsData = await resonse.json();
                renderTable();
            } catch (error) {
                console.error("Error loading contracts:", error);
                alert('Lỗi khi tải dữ liệu hợp đồng. Vui lòng thử lại sau.');
                contractsData = [];
                renderTable();
            }
        }

        async function loadProperties() {
            const select = document.getElementById('batDongSan');
            try {
                const response = await fetch('/api/properties');
                if (!response.ok) {
                    throw new Error("Failed to load properties");
                }
                const properties = await response.json();
                console.log(properties);

                while (select.options.length > 1) {
                    select.remove(1);
                }
                properties.forEach(prop => {
                    const option = document.createElement('option');
                    option.value = prop.id;
                    option.textContent = prop.name;
                    select.appendChild(option);
                })
            } catch (error) {
                console.error("Error loading properties:", error);
                alert('Lỗi khi tải dữ liệu BĐS. Vui lòng thử lại sau.');
                return;
            }
        }

        async function loadTenants() {
            const select = document.getElementById('khachThue');
            try {
                const response = await fetch('/api/tenants');
                if (!response.ok) {
                    throw new Error("Failed to load tenants");
                }
                const tenants = await response.json();
                console.log(tenants);
                while (select.options.length > 1) {
                    select.remove(1);
                }
                tenants.forEach(tenant => {
                    const option = document.createElement('option');
                    option.value = tenant.id;
                    option.textContent = tenant.fullName;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading tenants:", error);
                alert('Lỗi khi tải dữ liệu khách thuê. Vui lòng thử lại sau.');
                return;
            }
        }

        // renderTable()	Hiển thị dữ liệu hợp đồng lên bảng
        function renderTable() {
            const tbody = document.getElementById('contractsTable');
            if (contractsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>';
                return;
            }

            tbody.innerHTML = contractsData.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.property.name}</td>
                    <td>${c.tenant.fullName}</td>
                    <td>${c.startDate}</td>
                    <td>${c.endDate}</td>
                    <td>${c.deposit}Đ</td>
                    <td><span class="badge ${getStatusClass(c.status)}">${c.status}</span></td>
                    <td>
                        <button class="btn-small" onclick="editContract(${c.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteContract(${c.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        // getStatusClass()	Lấy lớp CSS tương ứng với trạng thái
        function getStatusClass(status) {
            switch(status) {
                case 'Hiệu lực': return 'active';
                case 'Kết thúc': return 'inactive';
                case 'Chờ duyệt': return 'pending';
                default: return '';
            }
        }
        // setupEventListeners()	Gắn sự kiện cho nút bấm
        function setupEventListeners() {
            document.getElementById('addContractBtn').addEventListener('click', openModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('contractForm').addEventListener('submit', saveContract);

            document.getElementById('searchInput').addEventListener('keyup', filterTable);
            document.getElementById('filterStatus').addEventListener('change', filterTable);
        }
        // openModal()	Mở modal thêm hợp đồng
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Hợp Đồng';
            document.getElementById('contractForm').reset();
            delete document.getElementById('contractForm').dataset.editingId;
            document.getElementById('contractModal').style.display = 'block';
        }
        // closeModal()	Đóng modal
        function closeModal() {
            document.getElementById('contractModal').style.display = 'none';
        }
        // saveContract()	Lưu hợp đồng mới
        async function saveContract(e) {
            e.preventDefault();

            const editingId = document.getElementById('contractForm').dataset.editingId;
            // Lấy dữ liệu từ form
            const propertyId = document.getElementById('batDongSan').value;
            const tenantId = document.getElementById('khachThue').value;
            const startDate = document.getElementById('ngayBatDau').value;
            const endDate = document.getElementById('ngayKetThuc').value;
            const deposit = document.getElementById('tienCoc').value;
            const status = document.getElementById('trangThai').value;

            // Kiểm tra required fields
            if (!propertyId || !tenantId || !startDate || !endDate || !deposit || !status) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }

            // Kiểm tra ngày kết thúc phải sau ngày bắt đầu
            if (new Date(endDate) <= new Date(startDate)) {
                alert('Ngày kết thúc phải sau ngày bắt đầu');
                return;
            }

            const contract = {
                id: editingId,
                propertyId: parseInt(propertyId),
                tenantId: parseInt(tenantId),
                startDate: startDate,  // Format YYYY-MM-DD từ input type="date"
                endDate: endDate,      // Format YYYY-MM-DD từ input type="date"
                deposit: parseFloat(deposit), // Convert sang number
                status: status
            };
            try {
                const url = editingId ? '/api/contracts/' + editingId : '/api/contracts';
                const method = editingId ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(contract)
                });
                if (!response.ok) {
                    throw new Error("Failed to save contract");
                }
                closeModal();
                await loadContracts();

            } catch (error) {
                console.error("Error saving contract:", error);
                alert('Lỗi khi lưu hợp đồng. Vui lòng thử lại sau.');
            }
        }

        // editContract()
        async function editContract(id) {
            try {
            const response = await fetch('/api/contracts/' + id);
                if (!response.ok) {
                    throw new Error("Failed to load contract details");
                }
                const contract = await response.json();
                document.getElementById('batDongSan').value = contract.property.id;
                document.getElementById('khachThue').value = contract.tenant.id;
                document.getElementById('ngayBatDau').value = contract.startDate;
                document.getElementById('ngayKetThuc').value = contract.endDate;
                document.getElementById('tienCoc').value = contract.deposit;
                document.getElementById('trangThai').value = contract.status;

                document.getElementById('contractForm').dataset.editingId = id;
                document.getElementById('modalTitle').textContent = 'Sửa Hợp Đồng';
                document.getElementById('contractModal').style.display = 'block';

            } catch (error) {
                console.error('Error:',error);
                alert('Lỗi khi tải chi tiết hợp đồng. Vui lòng thử lại sau.');
                return;
            }
        }
        // deleteContract()	Xóa hợp đồng
        async function deleteContract(id) {
            if (confirm('Bạn có chắc muốn xóa?')) {
                try {
                    const response = await fetch('/api/contracts/' + id,
                        { method: 'DELETE' }
                    );
                    if (!response.ok) {
                        throw new Error("Failed to delete contract");
                    }
                    await loadContracts();
                } catch (error) {
                    console.error("Error: ", error);
                    alert('Lỗi khi xóa hợp đồng. Vui lòng thử lại sau.');
                }
            } else return;
        }

        // tìm kiếm & lọc trạng thái
        function filterTable() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;

            const filtered = contractsData.filter(c => {
                const matchesSearch = c.property.name.toLowerCase().includes(searchText) ||
                    c.tenant.fullName.toLowerCase().includes(searchText);
                const matchesStatus = statusFilter === '' || c.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            const tbody = document.getElementById('contractsTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.property.name}</td>
                    <td>${c.tenant.fullName}</td>
                    <td>${c.startDate}</td>
                    <td>${c.endDate}</td>
                    <td>$${c.deposit}</td>
                    <td><span class="badge ${getStatusClass(c.status)}">${c.status}</span></td>
                    <td>
                        <button class="btn-small" onclick="editContract(${c.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteContract(${c.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        document.querySelector('#searchInput').addEventListener('keyup',filterTable);

            // Đóng modal khi click ngoài nội dung
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('contractModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

    </script>
</body>
</html>

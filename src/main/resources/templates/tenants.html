<!DOCTYPE html>
<html lang="vi" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khách Thuê - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/darkmode.js"></script>
    <script src="/js/pagination.js"></script>
    <script src="/js/search-utils.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item active">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item" sec:authorize="hasAnyRole('Admin', 'Quản lý')">                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item" sec:authorize="hasRole('Admin')">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Khách Thuê</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addTenantBtn">+ Thêm Khách Thuê</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên, SĐT hoặc email...">
                </div>

                <!-- Tenants Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Họ tên</th>
                                <th>CCCD</th>
                                <th>Điện thoại</th>
                                <th>Email</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="tenantsTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div class="pagination-buttons" id="paginationButtons">
                        <!-- Được tạo bởi JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Khách Thuê -->
    <div id="tenantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Khách Thuê</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="tenantForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ tên:</label>
                        <input type="text" id="hoTen" required>
                    </div>
                    <div class="form-group">
                        <label>CCCD:</label>
                        <input type="text" id="soCCCD" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Điện thoại:</label>
                        <input type="tel" id="soDienThoai" required>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let tenantsData = [];
        let userRole = '';
        let pagination = new PaginationManager({ pageSize: 8 });

        document.addEventListener('DOMContentLoaded', function() {
            fetchUserRole().then(() => {
                loadTenants();
                setupEventListeners();
                setupPaginationListener();
            });
        });

        async function fetchUserRole() {
            try {
                const response = await fetch('/api/me/role');
                if (!response.ok) return;
                const data = await response.json();
                userRole = data.role || '';
            } catch (error) {
                console.error('Error fetching user role:', error);
            }
        }

        async function loadTenants() {
            try {
                const response = await fetch('/api/tenants');
                if(!response.ok) {
                    throw new Error('Failed to load tenants');
                }

                tenantsData = await response.json();
                pagination.setData(tenantsData);
                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Error: ', error);
                alert('Lỗi khi tải dữ liệu khách thuê. Vui lòng thử lại sau.');
                tenantsData = [];
                pagination.setData(tenantsData);
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tenantsTable');
            const pagedData = pagination.getPagedData();

            if (tenantsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>';
                return;
            }

            if (pagedData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>';
                return;
            }

            tbody.innerHTML = pagedData.map(t => {
                let actions = `<button class="btn-small" onclick="editTenant(${t.id})">Sửa</button>`;
                if (userRole !== 'Nhân viên') {
                    actions += `<button class="btn-small btn-danger" onclick="deleteTenant(${t.id})">Xóa</button>`;
                }

                return `
                    <tr>
                        <td>#${t.id}</td>
                        <td>${t.fullName}</td>
                        <td>${t.idNumber}</td>
                        <td>${t.phone}</td>
                        <td>${t.email}</td>
                        <td>${actions}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            pagination.renderPaginationButtons('paginationButtons', 'goToTenantPage');
        }

        function goToTenantPage(page) {
            if (pagination.goToPage(page)) {
                renderTable();
                renderPagination();
                document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth' });
            }
        }

        function setupPaginationListener() {
            // pageSize fix cứng = 8 => không cần listener
        }

        function setupEventListeners() {
            document.getElementById('addTenantBtn')?.addEventListener('click', openModal);
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('cancelBtn')?.addEventListener('click', closeModal);
            document.getElementById('tenantForm')?.addEventListener('submit', saveTenant);
            document.getElementById('searchInput')?.addEventListener('keyup', filterTable);
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Khách Thuê';
            document.getElementById('tenantForm').reset();

            delete document.getElementById('tenantForm').dataset.editingId;
            document.getElementById('tenantModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('tenantModal').style.display = 'none';
        }

        async function saveTenant(e) {
            e.preventDefault();
            const editingId = document.getElementById('tenantForm').dataset.editingId;
            const tenant = {
                id: tenantsData.length + 1,
                fullName: document.getElementById('hoTen').value,
                idNumber: document.getElementById('soCCCD').value,
                phone: document.getElementById('soDienThoai').value,
                email: document.getElementById('email').value
            };
            if (!tenant.fullName||!tenant.idNumber||!tenant.phone||!tenant.email) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }
            try {
                const url = editingId ? `/api/tenants/${editingId}` : '/api/tenants';
                const method = editingId ? 'PUT' : 'POST';
                const response = await fetch (url , {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(tenant)
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to save tenant');
                }
                alert((editingId ? 'Cập nhật' : 'Thêm') + ' khách thuê thành công');
                closeModal();
                loadTenants();
            } catch (error) {
                console.error('Error: ', error);
                alert('Lỗi khi lưu khách thuê. Vui lòng thử lại sau.');
            }
        }

        async function editTenant(id) {
            try {
                const resonse = await fetch(`/api/tenants/${id}`);
                if (!resonse.ok) {
                    throw new Error('Failed to load tenant details');
                }
                const tenant = await resonse.json();

                document.getElementById('hoTen').value = tenant.fullName;
                document.getElementById('soCCCD').value = tenant.idNumber;
                document.getElementById('soDienThoai').value = tenant.phone;
                document.getElementById('email').value = tenant.email;

                document.getElementById('tenantForm').dataset.editingId = id;
                document.getElementById('modalTitle').textContent = 'Sửa Khách Thuê';
                document.getElementById('tenantModal').style.display = 'block';
            } catch (error) {
                console.error('Error: ', error);
                alert('Lỗi khi tải thông tin khách thuê. Vui lòng thử lại sau.');
            }
        }

        async function deleteTenant(id) {
            if (confirm('Bạn có chắc muốn xóa?')) {
                const response = await fetch(`/api/tenants/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) {
                    throw new Error('Failed to delete tenant');
                }
                alert('Xóa khách thuê thành công');
                loadTenants();
            } else {
                return;
            }
        }

        function filterTable() {
            try {
                const searchText = document.getElementById('searchInput').value;

                if (!searchText) {
                    pagination.clearFilter();
                } else {
                    pagination.filterData(t => {
                        return (t.fullName && searchWithoutDiacritics(searchText, t.fullName)) ||
                            (t.email && searchWithoutDiacritics(searchText, t.email)) ||
                            (t.phone && searchWithoutDiacritics(searchText, t.phone)) ||
                            (t.idNumber && searchWithoutDiacritics(searchText, t.idNumber));
                    });
                }

                renderTable();
                renderPagination();
            } catch (error) {
                console.error('Filter error:', error);
                alert('Lỗi tìm kiếm: ' + error.message);
            }
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('tenantModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>

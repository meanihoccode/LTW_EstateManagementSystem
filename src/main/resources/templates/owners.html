<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chủ Sở Hữu - Meani Real Estate</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/darkmode.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="symbol-m">M</span><span class="text-rest">eani</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/properties" class="nav-item">
                    <span class="icon">🏠</span>
                    <span>BĐS</span>
                </a>
                <a href="/contracts" class="nav-item">
                    <span class="icon">📜</span>
                    <span>Hợp đồng</span>
                </a>
                <a href="/payments" class="nav-item">
                    <span class="icon">💰</span>
                    <span>Thanh toán</span>
                </a>
                <a href="/tenants" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Khách thuê</span>
                </a>
                <a href="/owners" class="nav-item active">
                    <span class="icon">👤</span>
                    <span>Chủ sở hữu</span>
                </a>
                <a href="/staff" class="nav-item">
                    <span class="icon">👨‍💼</span>
                    <span>Nhân viên</span>
                </a>
                <a href="/accounts" class="nav-item">
                    <span class="icon">🔐‍</span>
                    <span>Tài khoản</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1>Quản lý Chủ Sở Hữu</h1>
                <div class="user-section">
                    <button class="btn-primary" id="addOwnerBtn">+ Thêm Chủ Sở Hữu</button>
                    <a href="/" class="btn-logout">Đăng xuất</a>
                </div>
            </div>

            <!-- Content -->
            <div class="dashboard-content">
                <!-- Search & Filter -->
                <div class="search-filter">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên, SĐT hoặc email...">
                </div>

                <!-- Owners Table -->
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Họ tên</th>
                                <th>Điện thoại</th>
                                <th>Email</th>
                                <th>Địa chỉ</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="ownersTable">
                            <tr>
                                <td colspan="6" style="text-align: center; color: #999;">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Thêm/Sửa Chủ Sở Hữu -->
    <div id="ownerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm Chủ Sở Hữu</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="ownerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ tên:</label>
                        <input type="text" id="hoTen" required>
                    </div>
                    <div class="form-group">
                        <label>Điện thoại:</label>
                        <input type="tel" id="soDienThoai" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group full">
                        <label>Địa chỉ:</label>
                        <input type="text" id="diaChi" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let ownersData = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadOwners();
            setupEventListeners();
        });

        async function loadOwners() {
            try {
                const response = await fetch('/api/owners');
                if (!response.ok) {
                    throw new Error('Failed to load owners');
                }
                ownersData = await response.json();
                renderTable();
            } catch (error) {
                console.error('Error: ',error);
                alert('Lỗi khi tải dữ liệu chủ sở hữu. Vui lòng thử lại sau.');
                ownersData = [];
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('ownersTable');
            if (ownersData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Không có dữ liệu</td></tr>';
                return;
            }

            tbody.innerHTML = ownersData.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.fullName}</td>
                    <td>${o.phone}</td>
                    <td>${o.email}</td>
                    <td>${o.address}</td>
                    <td>
                        <button class="btn-small" onclick="editOwner(${o.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteOwner(${o.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function setupEventListeners() {
            document.getElementById('addOwnerBtn').addEventListener('click', openModal);
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('ownerForm').addEventListener('submit', saveOwner);

            document.getElementById('searchInput').addEventListener('keyup', filterTable);
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Thêm Chủ Sở Hữu';
            document.getElementById('ownerForm').reset();
            delete document.getElementById('ownerForm').dataset.editingId;
            document.getElementById('ownerModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('ownerModal').style.display = 'none';
        }

        async function saveOwner(e) {
            e.preventDefault();
            const editingId = document.getElementById('ownerForm').dataset.editingId;
            const owner = {
                fullName: document.getElementById('hoTen').value,
                phone: document.getElementById('soDienThoai').value,
                email: document.getElementById('email').value,
                address: document.getElementById('diaChi').value
            };

            // Khi sửa, thêm id vào
            if (editingId) {
                owner.id = parseInt(editingId);
            }
            if (!owner.fullName||!owner.phone||!owner.email||!owner.address) {
                alert('Vui lòng điền đầy đủ thông tin');
                return;
            }
            try {
                const url = editingId ? `/api/owners/${editingId}` : '/api/owners';
                const method = editingId ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(owner)
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    console.log('Error response: ',errorData);
                    throw new Error(errorData.message || 'Failed to save owner');
                }
                alert((editingId ? 'Cập nhật' : 'Thêm') + ' chủ sở hữu thành công');
                closeModal();
                loadOwners();
            } catch (error) {
                console.error('Error: ',error);
                alert('Lỗi khi lưu chủ sở hữu. Vui lòng thử lại sau.');
            }
        }

        async function editOwner(id) {
            try {
                const response = await fetch(`/api/owners/${id}`);
                if (!response.ok) {
                    throw new Error('Failed to load owner details');
                }
                const owner = await response.json();

                document.getElementById('modalTitle').textContent = 'Sửa Chủ Sở Hữu';
                document.getElementById('hoTen').value = owner.fullName;
                document.getElementById('soDienThoai').value = owner.phone;
                document.getElementById('email').value = owner.email;
                document.getElementById('diaChi').value = owner.address;
                document.getElementById('ownerForm').dataset.editingId = id;
                document.getElementById('ownerModal').style.display = 'block';
            } catch (error) {
                console.error('Error: ',error);
                alert('Lỗi khi tải thông tin chủ sở hữu. Vui lòng thử lại sau.');
            }
        }

        async function deleteOwner(id) {
            if (confirm('Bạn có chắc muốn xóa?')) {
                try {
                    const response = await fetch(`/api/owners/${id}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'Failed to delete owner');
                    }
                    alert('Xoá chủ sở hữu thành công');
                    loadOwners();
                } catch (error) {
                    console.error('Error: ',error);
                    alert('Lỗi khi xoá chủ sở hữu. Vui lòng thử lại sau.');
                }
            }
        }

        function filterTable() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            const filtered = ownersData.filter(o => {
                return o.fullName.toLowerCase().includes(searchText) ||
                    o.email.toLowerCase().includes(searchText) || o.phone.includes(searchText);
            });

            const tbody = document.getElementById('ownersTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">Không tìm thấy kết quả</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.fullName}</td>
                    <td>${o.phone}</td>
                    <td>${o.email}</td>
                    <td>${o.address}</td>
                    <td>
                        <button class="btn-small" onclick="editOwner(${o.id})">Sửa</button>
                        <button class="btn-small btn-danger" onclick="deleteOwner(${o.id})">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }
        document.querySelector('#searchInput').addEventListener('keyup',filterTable);

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('ownerModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
